name: CD — Deploy QA

on:
  workflow_run:
    workflows: ["CD — Deploy DEV"]
    types: [completed]

jobs:
  deploy-qa:
    name: Deploy QA
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group klauz-dev-rg \
            --name klauz-dev-aks \
            --overwrite-existing

      - name: Set image tags with Kustomize
        run: |
          cd infra/k8s/overlays/qa
          kustomize edit set image \
            klauzdevacr.azurecr.io/backend=${{ secrets.ACR_LOGIN_SERVER }}/backend:sha-${{ github.event.workflow_run.head_sha }} \
            klauzdevacr.azurecr.io/frontend=${{ secrets.ACR_LOGIN_SERVER }}/frontend:sha-${{ github.event.workflow_run.head_sha }}

      - name: Deploy to QA
        run: kubectl apply -k infra/k8s/overlays/qa

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n klauz-qa --timeout=300s
          kubectl rollout status deployment/frontend -n klauz-qa --timeout=300s

      - name: Verify deployment
        run: |
          echo "QA Backend pods:"
          kubectl get pods -n klauz-qa -l app=backend
          echo "QA Frontend pods:"
          kubectl get pods -n klauz-qa -l app=frontend
          echo "QA Deploy completed successfully"
