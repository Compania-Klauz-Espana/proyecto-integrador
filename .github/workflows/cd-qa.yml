name: CD — Deploy QA

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag de imagen (ej: sha-abc1234)'
        required: true
        type: string

jobs:
  deploy-qa:
    name: Deploy QA
    runs-on: ubuntu-latest
    environment:
      name: qa
      url: https://qa.proyecto-integrador.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group klauz-qa-rg \
            --name klauz-qa-aks \
            --overwrite-existing

      - name: Set image tags with Kustomize
        run: |
          cd infra/k8s/overlays/qa
          kustomize edit set image \
            klauzdevacr.azurecr.io/backend=${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ inputs.image_tag }} \
            klauzdevacr.azurecr.io/frontend=${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ inputs.image_tag }}

      - name: Deploy to QA
        run: kubectl apply -k infra/k8s/overlays/qa

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n klauz-qa --timeout=300s
          kubectl rollout status deployment/frontend -n klauz-qa --timeout=300s
