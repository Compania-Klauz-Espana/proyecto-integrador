name: CD — Deploy DEV

on:
  workflow_run:
    workflows: ["CI — Backend", "CI — Frontend"]
    types: [completed]
    branches: [develop]

jobs:
  deploy-dev:
    name: Deploy → DEV
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: dev
      url: https://dev.tudominio.com
    steps:
      - uses: actions/checkout@v4
      # TODO Sprint 3 — agregar steps de deploy con Kustomize
      - run: echo "Deploy a DEV — SHA ${{ github.sha }}"
