name: CD — Deploy DEV

on:
  workflow_run:
    workflows: ["CI — Backend", "CI — Frontend"]
    types: [completed]
    branches: [develop, main]

jobs:
  deploy-dev:
    name: Deploy DEV
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: dev
      url: http://20.85.80.25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group klauz-dev-rg \
            --name klauz-dev-aks \
            --overwrite-existing

      - name: Set image tags with Kustomize
        run: |
          cd infra/k8s/overlays/dev
          kustomize edit set image \
            klauzdevacr.azurecr.io/backend=${{ secrets.ACR_LOGIN_SERVER }}/backend:sha-${{ github.sha }} \
            klauzdevacr.azurecr.io/frontend=${{ secrets.ACR_LOGIN_SERVER }}/frontend:sha-${{ github.sha }}

      - name: Deploy to DEV
        run: kubectl apply -k infra/k8s/overlays/dev

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n klauz-dev --timeout=300s
          kubectl rollout status deployment/frontend -n klauz-dev --timeout=300s

      - name: Smoke test
        run: |
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl -n klauz-dev -- \
            curl -sf --max-time 10 http://backend:8080/actuator/health || true
          echo "Smoke test completed"
