name: CD — Deploy PROD

on:
  workflow_run:
    workflows: ["CD — Deploy QA"]
    types: [completed]

jobs:
  deploy-prod:
    name: Deploy PROD
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group klauz-dev-rg \
            --name klauz-dev-aks \
            --overwrite-existing

      - name: Set image tags with Kustomize
        run: |
          cd infra/k8s/overlays/prod
          kustomize edit set image \
            klauzdevacr.azurecr.io/backend=${{ secrets.ACR_LOGIN_SERVER }}/backend:sha-${{ github.event.workflow_run.head_sha }} \
            klauzdevacr.azurecr.io/frontend=${{ secrets.ACR_LOGIN_SERVER }}/frontend:sha-${{ github.event.workflow_run.head_sha }}

      - name: Deploy to PROD (Rolling Update)
        run: kubectl apply -k infra/k8s/overlays/prod

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n klauz-prod --timeout=300s
          kubectl rollout status deployment/frontend -n klauz-prod --timeout=300s

      - name: Verify deployment
        run: |
          echo "PROD Backend pods:"
          kubectl get pods -n klauz-prod -l app=backend
          echo "PROD Frontend pods:"
          kubectl get pods -n klauz-prod -l app=frontend
          echo "PROD Deploy completed successfully"

      - name: Auto rollback on failure
        if: failure()
        run: |
          echo "Ejecutando rollback automatico..."
          kubectl rollout undo deployment/backend -n klauz-prod
          kubectl rollout undo deployment/frontend -n klauz-prod
          echo "Rollback completado"
